<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wordly Dictionary</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1> Wordly Dictionary</h1>

  <form id="search-form">
    <input type="text" id="word-input" placeholder="Enter a word..." required />
    <button type="submit">Search</button>
  </form>

  <div id="error" class="hidden"></div>

  <div id="result">
    <h2 id="word-title"></h2>
    <p id="part-of-speech"></p>
    <p id="definition"></p>
    <p id="example"></p>
    <p id="synonyms"></p>
    <audio id="audio" controls class="hidden"></audio>
  </div>

</body>
<script src="index.js"></script>
</html>
